receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  transform/mask_pii:
    error_mode: ignore
    log_statements:
      - context: log
        statements:
          # Mask IBAN in all log attributes (covers structured fields like iban, accountNumber, etc.)
          - replace_all_patterns(attributes, "value", "\\b[A-Z]{2}[0-9]{2}[A-Z0-9]{4}[0-9]{7}([A-Z0-9]?){0,16}\\b", "***IBAN***")
          # Mask IBAN embedded in the log body string
          - replace_pattern(body, "\\b[A-Z]{2}[0-9]{2}[A-Z0-9]{4}[0-9]{7}([A-Z0-9]?){0,16}\\b", "***IBAN***")

exporters:
  debug:
    verbosity: detailed
  otlp_http/honeycomb:
    endpoint: https://api.honeycomb.io
    headers:
      x-honeycomb-team: ${env:HONEYCOMB_API_KEY}
  otlp_http/aspire:
    endpoint: ${env:DOTNET_DASHBOARD_OTLP_HTTP_ENDPOINT_URL}
    headers:
      x-otlp-api-key: ${env:ASPIRE_API_KEY}
    compression: none
    tls:
      insecure: true
      insecure_skip_verify: true

service:
  telemetry:
    logs:
      level: debug
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [debug, otlp_http/aspire, otlp_http/honeycomb]
    metrics:
      receivers: [otlp]
      exporters: [debug, otlp_http/aspire, otlp_http/honeycomb]
    logs:
      receivers: [otlp]
      processors: [transform/mask_pii]
      exporters: [debug, otlp_http/aspire, otlp_http/honeycomb]
