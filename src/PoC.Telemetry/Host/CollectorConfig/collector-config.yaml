receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

exporters:
  debug:
    verbosity: detailed
  otlp_http/honeycomb:
    endpoint: https://api.honeycomb.io
    headers:
      x-honeycomb-team: ${env:HONEYCOMB_API_KEY}
  otlp_http/aspire:
    endpoint: ${env:DOTNET_DASHBOARD_OTLP_HTTP_ENDPOINT_URL}
    headers:
      x-otlp-api-key: ${env:ASPIRE_API_KEY}
    compression: none
    tls:
      insecure: true
      insecure_skip_verify: true

service:
  telemetry:
    logs:
      level: debug
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [debug, otlp_http/aspire, otlp_http/honeycomb]
    metrics:
      receivers: [otlp]
      exporters: [debug, otlp_http/aspire, otlp_http/honeycomb]
    logs:
      receivers: [otlp]
      exporters: [debug, otlp_http/aspire, otlp_http/honeycomb]
