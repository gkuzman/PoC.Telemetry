processors:
  transform/mask_pii:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          # Mask IBAN in all span attributes
          - replace_all_patterns(attributes, "value", "\\b[A-Z]{2}[0-9]{2}[A-Z0-9]{4}[0-9]{7}([A-Z0-9]?){0,16}\\b", "***IBAN***")
    log_statements:
      - context: log
        statements:
          # Mask IBAN in all log attributes (covers structured fields like iban, accountNumber, etc.)
          - replace_all_patterns(attributes, "value", "\\b[A-Z]{2}[0-9]{2}[A-Z0-9]{4}[0-9]{7}([A-Z0-9]?){0,16}\\b", "***IBAN***")
          # Mask IBAN embedded in the log body string
          - replace_pattern(body, "\\b[A-Z]{2}[0-9]{2}[A-Z0-9]{4}[0-9]{7}([A-Z0-9]?){0,16}\\b", "***IBAN***")


